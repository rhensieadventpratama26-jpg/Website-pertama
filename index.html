<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Aesthetic Web</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        /* WARNA BACKGROUND & TEXT */
        body {
            background-color: #0d0e11; 
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 90%;
            width: 400px;
            padding: 20px;
        }

        /* GAYA TULISAN JUDUL */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a0aec0;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* GAYA FOTO */
        .aesthetic-img {
            width: 100%;
            height: 250px;
            object-fit: cover; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            border: 1px solid #2d3748;
        }

        /* GAYA TOMBOL PUTIH */
        .btn-link {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            background: #ffffff; 
            color: #0d0e11;      
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Future is Now.</h1>
        <p>Bikin website keren bermodalkan HP doang? Bisa banget. Ini buktinya, dibikin pakai Acode dan langsung live di Vercel.</p>
        
        <img class="aesthetic-img" src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500" alt="Aesthetic Setup">
        
        <a href="https://instagram.com/rhensie" class="btn-link">Hubungi Saya</a>
    </div>

</body>
</html>
